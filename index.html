<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RUNE TRIBE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Blood Crow';
      src: url('bloodcrowe.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
      -webkit-font-smoothing: none;
      -moz-osx-font-smoothing: grayscale;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .menu {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 900px;
      padding: 1rem;
    }

    .title-wrap {
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .title {
      font-family: 'Blood Crow', Impact, sans-serif !important;
      font-size: clamp(3rem, 10vw, 6.5rem);
      color: #e02020;
      text-shadow:
        0 0 0 2px #000,
        2px 2px 0 #8b0000,
        4px 4px 0 #4a0000,
        0 2px 0 rgba(255,180,180,0.5);
      letter-spacing: 0.08em;
      line-height: 1.2;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .ascii-container {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 220px;
      margin: 0.5rem 0;
    }

    #ascii-canvas {
      display: block;
      width: 100%;
      max-height: 42vh;
      height: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .press-start {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.5rem, 1.8vw, 0.7rem);
      color: #fff;
      letter-spacing: 0.2em;
      margin: 1rem 0;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    .copyright {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.4rem, 1.2vw, 0.5rem);
      color: #fff;
      letter-spacing: 0.1em;
      text-align: center;
      line-height: 2;
    }

    .no-video {
      color: #555;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      text-align: center;
      padding: 2rem;
    }
    .no-video a { color: #cc2222; }
  </style>
</head>
<body>
  <video id="video" crossorigin="anonymous" style="display:none" muted loop playsinline autoplay>
    <source src="assets/mask.mp4" type="video/mp4">
  </video>
  <canvas id="source" style="display:none"></canvas>

  <div class="menu">
    <div class="title-wrap">
      <h1 class="title">RUNE TRIBE</h1>
    </div>
    <div class="ascii-container">
      <canvas id="ascii-canvas" style="display:none"></canvas>
    </div>
    <p class="press-start">PRESS START BUTTON</p>
    <p class="copyright">TM&© 2025 RUNE TRIBE<br>ALL RIGHTS RESERVED</p>
  </div>

  <div id="no-video" class="no-video" style="display:none">
    <p>Put mask.mp4 in assets/</p>
  </div>

  <script>
    const video = document.getElementById('video');
    const sourceCanvas = document.getElementById('source');
    const sourceCtx = sourceCanvas.getContext('2d');
    const asciiCanvas = document.getElementById('ascii-canvas');
    const asciiCtx = asciiCanvas.getContext('2d');
    const noVideo = document.getElementById('no-video');

    const CHARS = ' .\'`^",:;Il!i><~+_-?][}{1)(|\\/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$';
    const COLS = 150;
    const CELL_W = 4;
    const CELL_H = 6;
    const BG_COLOR = '#000';
    const WHITE_THRESHOLD = 245; // hide white bg + light aura/edge
    const FPS_TARGET = 12; // slower than video's native fps
    let lastFrameTime = 0;

    function luminance(r, g, b) {
      return 0.299 * r + 0.587 * g + 0.114 * b;
    }

    function charForLuminance(lum) {
      const idx = Math.min(Math.floor((lum / 255) * CHARS.length), CHARS.length - 1);
      return CHARS[idx];
    }

    function boostColor(r, g, b, lum) {
      const boost = 1.15;
      const gray = lum;
      return [
        Math.min(255, Math.round(r * boost + (1 - boost) * gray)),
        Math.min(255, Math.round(g * boost + (1 - boost) * gray)),
        Math.min(255, Math.round(b * boost + (1 - boost) * gray))
      ];
    }

    function processFrame() {
      if (video.readyState < 2) return;

      const vw = video.videoWidth;
      const vh = video.videoHeight;
      if (!vw || !vh) return;

      const cellW = vw / COLS;
      const cellH = cellW * (CELL_H / CELL_W);
      const rows = Math.floor(vh / cellH);

      const outW = COLS * CELL_W;
      const outH = rows * CELL_H;

      sourceCanvas.width = vw;
      sourceCanvas.height = vh;
      sourceCtx.drawImage(video, 0, 0);

      const imgData = sourceCtx.getImageData(0, 0, vw, vh);
      const data = imgData.data;

      asciiCanvas.width = outW;
      asciiCanvas.height = outH;
      asciiCtx.fillStyle = BG_COLOR;
      asciiCtx.fillRect(0, 0, outW, outH);

      asciiCtx.font = `bold ${CELL_H}px "Consolas","Monaco","Courier New",monospace`;
      asciiCtx.textBaseline = 'top';

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < COLS; col++) {
          const px = Math.floor(col * cellW + cellW / 2);
          const py = Math.floor(row * cellH + cellH / 2);
          let r = 0, g = 0, b = 0, n = 0;
          for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
              const sx = Math.min(vw - 1, Math.max(0, px + dx));
              const sy = Math.min(vh - 1, Math.max(0, py + dy));
              const i = (sy * vw + sx) * 4;
              r += data[i]; g += data[i + 1]; b += data[i + 2]; n++;
            }
          }
          r /= n; g /= n; b /= n;
          const lum = luminance(r, g, b);
          if (lum >= WHITE_THRESHOLD) continue;
          const [rr, gg, bb] = boostColor(r, g, b, lum);
          const char = charForLuminance(lum);
          asciiCtx.fillStyle = `rgb(${rr},${gg},${bb})`;
          asciiCtx.fillText(char, col * CELL_W, row * CELL_H);
        }
      }
    }

    function nextFrame(timestamp) {
      if (video.paused || video.ended) return;
      const elapsed = timestamp - lastFrameTime;
      if (elapsed >= 1000 / FPS_TARGET) {
        lastFrameTime = timestamp;
        processFrame();
      }
      requestAnimationFrame(nextFrame);
    }

    video.addEventListener('loadeddata', () => {
      asciiCanvas.style.display = 'block';
      noVideo.style.display = 'none';
      video.play().catch(() => {});
      requestAnimationFrame(nextFrame);
    });

    video.addEventListener('error', () => {
      asciiCanvas.style.display = 'none';
      noVideo.style.display = 'block';
    });

    video.play().catch(() => {});
  </script>
</body>
</html>
